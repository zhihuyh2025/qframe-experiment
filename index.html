<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Q帧切换实验</title>
<script src="https://unpkg.com/jspsych@7.3.4/dist/jspsych.js"></script>
<link href="https://unpkg.com/jspsych@7.3.4/dist/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
<script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
<style>
  body { font-family: 'Segoe UI',Arial,sans-serif; background:#1a1a2e; color:#eee; }
  .jspsych-content { max-width:800px; margin:0 auto; }
  .task-box { background:#16213e; border:2px solid #0f3460; border-radius:12px;
              padding:30px; margin:20px 0; text-align:center; }
  .fixation { font-size:64px; color:#e94560; }
  .stimulus { font-size:28px; margin:20px 0; }
  .timer-bar { height:8px; background:#e94560; border-radius:4px;
               transition:width 0.1s linear; margin:10px auto; }
  .progress-bar { height:4px; background:#0f3460; border-radius:2px; margin-bottom:30px; }
  .progress-fill { height:100%; background:#e94560; border-radius:2px; transition:width 0.3s; }
  .instruction { line-height:1.8; font-size:17px; }
  .highlight { color:#e94560; font-weight:bold; }
  input[type=text] { font-size:32px; padding:12px; width:200px; text-align:center;
                     border:2px solid #0f3460; border-radius:8px; background:#16213e; color:#eee; }
  button { font-size:20px; padding:12px 30px; border:none; border-radius:8px;
           background:#e94560; color:#fff; cursor:pointer; margin:5px; }
  button:hover { background:#c73e54; }
  .math-problem { font-size:48px; margin:20px 0; letter-spacing:4px; }
  .rating-row { display:flex; justify-content:center; gap:12px; margin:20px 0; }
  .rating-btn { width:50px; height:50px; font-size:18px; }
  .target { position:absolute; width:50px; height:50px; background:#e94560;
            border-radius:50%; cursor:pointer; }
  .score { position:absolute; top:10px; right:20px; font-size:24px; color:#e94560; }
  .click-area { position:relative; width:600px; height:400px; background:#0f3460;
                margin:0 auto; border-radius:12px; overflow:hidden; }
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════════
// Q帧切换实验 — 行为检验非交换性
// ══════════════════════════════════════════════════

const jsPsych = initJsPsych({
  on_finish: function() {
    const data = jsPsych.data.get().csv();
    const blob = new Blob([data], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `qframe_${Date.now()}.csv`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }
});

// 随机分配被试ID和顺序
const subjectId = Math.floor(Math.random()*10000);
const orderFirst = (subjectId % 2 === 0) ? 'AB' : 'BA'; // 偶数: A先, 奇数: B先

// ── 工具: 进度条 ──
function progressHtml(current,total) {
  const pct = Math.round(current/total*100);
  return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <small>${current}/${total}</small>`;
}

// ── 任务1: 认知/心算 ──
function makeMathTrial(duration_ms) {
  const a = Math.floor(Math.random()*40)+10;
  const b = Math.floor(Math.random()*40)+10;
  const op = Math.random()<0.5 ? '+' : '-';
  const answer = op==='+' ? a+b : a-b;
  const startTime = performance.now();
  
  return {
    type: jsPsychSurveyText,
    preamble: `<div class="task-box">
      <div class="timer-bar" id="math-timer" style="width:0%"></div>
      <div class="math-problem">${a} ${op} ${b} = ?</div>
      <p style="color:#888">心算任务 — 请输入答案</p></div>`,
    questions: [{prompt:'', name:'answer', required:false}],
    data: {task:'cognitive', phase:'task', a:a, b:b, op:op, correct:answer},
    on_load: function() {
      const timer = document.getElementById('math-timer');
      const interval = setInterval(() => {
        const elapsed = performance.now()-startTime;
        const pct = Math.min(100,elapsed/duration_ms*100);
        if(timer) timer.style.width = pct+'%';
        if(elapsed>=duration_ms) clearInterval(interval);
      }, 100);
      setTimeout(() => { jsPsych.finishTrial(); }, duration_ms);
    }
  };
}

// ── 任务2: 情感/评价 ──
const emotionWords = [
  {word:'宁静', valence:7}, {word:'愤怒', valence:2}, {word:'愉悦', valence:8},
  {word:'悲伤', valence:2}, {word:'兴奋', valence:8}, {word:'恐惧', valence:1},
  {word:'满足', valence:7}, {word:'厌恶', valence:2}, {word:'温暖', valence:8},
  {word:'焦虑', valence:3}, {word:'自豪', valence:7}, {word:'羞耻', valence:2},
  {word:'惊喜', valence:8}, {word:'孤独', valence:2}, {word:'感激', valence:8},
  {word:'内疚', valence:3}, {word:'好奇', valence:7}, {word:'嫉妒', valence:3},
];

function makeAffectiveTrial(duration_ms) {
  const stim = emotionWords[Math.floor(Math.random()*emotionWords.length)];
  const startTime = performance.now();
  
  return {
    type: jsPsychSurveyLikert,
    preamble: `<div class="task-box">
      <div class="timer-bar" id="aff-timer" style="width:0%"></div>
      <div class="stimulus">"${stim.word}"</div>
      <p style="color:#888">情感评价 — 这个词让你感觉如何? (1=非常负面, 9=非常正面)</p></div>`,
    questions: [{prompt:'', name:'rating', labels:['1','2','3','4','5','6','7','8','9']}],
    data: {task:'affective', phase:'task', word:stim.word, valence:stim.valence},
    on_load: function() {
      const timer = document.getElementById('aff-timer');
      const interval = setInterval(() => {
        const elapsed = performance.now()-startTime;
        const pct = Math.min(100,elapsed/duration_ms*100);
        if(timer) timer.style.width = pct+'%';
        if(elapsed>=duration_ms) clearInterval(interval);
      }, 100);
      setTimeout(() => { 
        try { jsPsych.finishTrial(); } catch(e) {}
      }, duration_ms);
    }
  };
}

// ── 任务3: 运动/快速按键 ──
function makeMotorTrial(duration_ms) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="task-box">
      <div class="timer-bar" id="motor-bar" style="width:0%"></div>
      <div style="font-size:48px;margin:30px">🔥</div>
      <p style="color:#888">尽可能快地反复按空格键!</p>
      <p style="font-size:20px;margin-top:20px;color:#e94560" id="press-hint"></p></div>`,
    choices: [' '],
    trial_duration: duration_ms,
    response_ends_trial: false,
    data: {task:'motor', phase:'task'},
    on_load: function() {
      const start = performance.now();
      const timer = setInterval(() => {
        const elapsed = performance.now()-start;
        const pct = Math.min(100,elapsed/duration_ms*100);
        const bar = document.getElementById('motor-bar');
        if(bar) bar.style.width = pct+'%';
        if(elapsed >= duration_ms) clearInterval(timer);
      }, 100);
    },
    on_finish: function(data) {
      data.clicks = Array.isArray(data.response) ? data.response.length : 0;
    }
  };
}

// ── 注视十字 (Q0基线) ──
function makeFixation(duration_ms) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="fixation">+</div>
               <p style="color:#666;margin-top:20px">注视十字，放松</p>`,
    choices: 'NO_KEYS',
    trial_duration: duration_ms,
    data: {task:'fixation', phase:'rest'}
  };
}

// ── Probe: 简单选择RT ──
function makeProbeTrial() {
  const num = Math.floor(Math.random()*90)+10;
  const isEven = num%2===0;
  
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="task-box">
      <div style="font-size:56px;margin:30px">${num}</div>
      <p>奇数按 <span class="highlight">F</span> &nbsp;|&nbsp; 偶数按 <span class="highlight">J</span></p></div>`,
    choices: ['f','j'],
    data: {task:'probe', num:num, correct:isEven?'j':'f'},
    on_finish: function(data) {
      data.correct_response = isEven ? 'j' : 'f';
      data.accuracy = data.response === data.correct_response ? 1 : 0;
    }
  };
}

// ── 构建一个Block ──
function buildBlock(blockLabel, orderLabel, firstTask, secondTask, taskDuration, nCycles) {
  const trials = [];
  
  for(let c=0; c<nCycles; c++) {
    // Q0 → Q_first → Q0 → Q_second → Q0
    trials.push(makeFixation(3000));                         // 基线
    trials.push(firstTask(taskDuration));                    // 任务1
    trials.push(makeFixation(5000));                         // 恢复
    trials.push(secondTask(taskDuration));                   // 任务2
    trials.push(makeFixation(5000));                         // 恢复
    
    // Probe: 5个RT试次
    for(let p=0; p<5; p++) {
      const probe = makeProbeTrial();
      probe.data.block = blockLabel;
      probe.data.order_label = orderLabel;
      probe.data.cycle = c;
      trials.push(probe);
    }
  }
  
  // 块间休息
  trials.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="task-box">
      <h3>本阶段完成</h3>
      <p>请休息一下，准备好后按空格键继续</p></div>`,
    choices: [' '],
    data: {task:'break', phase:'rest', block:blockLabel}
  });
  
  return trials;
}

// ══════════════════════════════════════════════════
// 实验时间线
// ══════════════════════════════════════════════════

const timeline = [];

// 欢迎
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<h2>Q帧切换实验</h2>
    <div class="instruction">
    <p>本研究探讨不同心理任务之间的切换如何影响后续表现。</p>
    <p>你将完成三种任务:</p>
    <p>🧮 <span class="highlight">心算</span> — 加减法计算</p>
    <p>💭 <span class="highlight">情感评价</span> — 对词语评分</p>
    <p>⚡ <span class="highlight">快速按键</span> — 尽可能快按空格</p>
    <p>任务间会有 <span class="highlight">+</span> 注视十字让你休息。</p>
    <p>最后会有简单的反应时测试。</p>
    <p style="margin-top:30px">全程约 <span class="highlight">12分钟</span>。</p>
    <p style="margin-top:20px">按空格键开始</p></div>`,
  choices: [' ']
});

// 练习阶段: 熟悉三种任务
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<h3>练习阶段</h3>
    <p>先熟悉一下每种任务。按空格开始。</p>`,
  choices: [' ']
});

// 练习: 心算
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h3>🧮 心算</h3>
    <p>你会看到加减法算式，在框中输入答案。</p>
    <p>尽量快速准确。</p></div>`,
  choices: [' ']
});
timeline.push(makeMathTrial(10000));

// 练习: 情感
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h3>💭 情感评价</h3>
    <p>看到情感词语后，点击1-9评分。</p>
    <p>1=非常负面, 9=非常正面。</p></div>`,
  choices: [' ']
});
timeline.push(makeAffectiveTrial(10000));

// 练习: 运动
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h3>⚡ 快速按键</h3>
    <p>持续按空格键，越快越好!</p></div>`,
  choices: [' ']
});
timeline.push(makeMotorTrial(8000));

// 练习probe
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h3>反应时测试</h3>
    <p>看到一个数字，判断奇偶:</p>
    <p>奇数 → <span class="highlight">F</span> &nbsp; 偶数 → <span class="highlight">J</span></p>
    <p>尽量快速准确!</p></div>`,
  choices: [' ']
});
for(let i=0; i<8; i++) timeline.push(makeProbeTrial());

// ── 主实验 ──
const TASK_DURATION = 8000; // 每个任务8秒
const N_CYCLES = 3;         // 每block 3个循环

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<h3>主实验开始</h3>
    <p>以下将进行多个任务块。</p>
    <p>请保持专注。按空格开始。</p>`,
  choices: [' ']
});

// 根据counterbalancing决定顺序
let blockATrials, blockBTrials;

blockATrials = buildBlock('A', 'Cog→Aff', makeMathTrial, makeAffectiveTrial, TASK_DURATION, N_CYCLES);
blockBTrials = buildBlock('B', 'Aff→Cog', makeAffectiveTrial, makeMathTrial, TASK_DURATION, N_CYCLES);

if(orderFirst === 'AB') {
  timeline.push(...blockATrials);
  timeline.push(...blockBTrials);
} else {
  timeline.push(...blockBTrials);
  timeline.push(...blockATrials);
}

// 结束
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<h2>实验完成!</h2>
    <p>感谢你的参与。数据将自动下载。</p>
    <p>你的被试ID: <span class="highlight">${subjectId}</span></p>
    <p>顺序: <span class="highlight">${orderFirst}</span></p>`,
  choices: [' ']
});

// ── 保存额外信息 ──
jsPsych.data.addProperties({
  subject_id: subjectId,
  order: orderFirst,
  timestamp: new Date().toISOString()
});

// 启动
jsPsych.run(timeline);
</script>
</body>
</html>
